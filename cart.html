<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CART | ODESHI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .header-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0.95), rgba(0,0,0,0)); backdrop-filter: blur(12px); }
        .cart-item { border-bottom: 1px solid #18181b; }
    </style>
</head>
<body class="selection:bg-red-600 overflow-x-hidden">

    <div class="fixed top-0 left-0 w-full z-50 p-6 flex justify-between items-center header-gradient">
        <a href="index.html"><img src=".src/odeshi-2.png" class="h-6 w-auto mix-blend-difference" alt="Logo"></a>
        <a href="shop.html" class="text-[10px] font-black uppercase tracking-widest border-b border-white pb-1">Continue Shopping</a>
    </div>

    <main class="pt-40 pb-24 px-6 md:px-20 max-w-6xl mx-auto">
        <h1 class="text-6xl font-black uppercase tracking-tighter mb-16">Bag</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-20">
            <!-- Items -->
            <div class="lg:col-span-2 space-y-10">
                <!-- Item 1 -->
                <div class="cart-item pb-10 flex gap-6">
                    <div class="w-32 aspect-[3/4] bg-zinc-900 rounded-2xl overflow-hidden">
                        <img src=".src/odeshi-bfbloodline-black-hoodie.jpeg" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 flex flex-col justify-between">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold uppercase text-lg">Bloodline Hoodie</h4>
                                <p class="text-zinc-500 text-xs uppercase font-mono mt-1">Size: L / Color: Black</p>
                            </div>
                            <p class="font-mono text-lg">$120.00</p>
                        </div>
                        <div class="flex justify-between items-end">
                            <div class="flex items-center border border-zinc-800 rounded-full px-4 py-1">
                                <button class="text-zinc-500 hover:text-white">-</button>
                                <span class="mx-4 text-xs font-mono">1</span>
                                <button class="text-zinc-500 hover:text-white">+</button>
                            </div>
                            <button class="text-zinc-600 hover:text-red-600 transition-colors text-[10px] font-bold uppercase tracking-widest">Remove</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Summary -->
            <div class="lg:col-span-1">
                <div class="bg-zinc-950 p-8 rounded-3xl border border-zinc-900 sticky top-32">
                    <h3 class="text-xs font-mono uppercase tracking-widest text-zinc-500 mb-8">Order Summary</h3>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-sm">
                            <span class="text-zinc-400">Subtotal</span>
                            <span class="font-mono">$120.00</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-zinc-400">Shipping</span>
                            <span class="font-mono">Calculated at next step</span>
                        </div>
                        <div class="flex justify-between text-lg font-bold pt-4 border-t border-zinc-900">
                            <span>Total</span>
                            <span class="font-mono">$120.00</span>
                        </div>
                    </div>
                    <button onclick="window.location.href='checkout.html'" class="w-full bg-white text-black py-5 rounded-full font-black uppercase text-xs tracking-widest hover:bg-red-600 hover:text-white transition-all">Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
