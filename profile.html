<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFILE | ODESHI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .header-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0.95), rgba(0,0,0,0)); backdrop-filter: blur(12px); }
        .order-row { border-bottom: 1px solid #18181b; }
    </style>
</head>
<body class="selection:bg-red-600">

    <div class="fixed top-0 left-0 w-full z-50 p-6 flex justify-between items-center header-gradient">
        <a href="index.html"><img src=".src/odeshi-2.png" class="h-6 w-auto mix-blend-difference" alt="Logo"></a>
        <div class="flex items-center gap-7">
            <a href="wishlist.html"><i data-lucide="heart" class="w-6 h-6"></i></a>
            <a href="cart.html" class="relative"><i data-lucide="shopping-cart" class="w-6 h-6"></i></a>
        </div>
    </div>

    <main class="pt-40 pb-24 px-6 md:px-20 max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row gap-20">
            <!-- Sidebar -->
            <aside class="w-full md:w-64">
                <div class="mb-12">
                    <h2 class="text-3xl font-black uppercase mb-2">V. ALARIC</h2>
                    <p class="text-zinc-500 font-mono text-xs">MEMBER SINCE 2024</p>
                </div>
                <nav class="flex flex-col gap-4">
                    <a href="#" class="text-white font-bold uppercase text-xs tracking-widest py-2 border-b border-white">Orders</a>
                    <a href="wishlist.html" class="text-zinc-500 hover:text-white font-bold uppercase text-xs tracking-widest py-2">Wishlist</a>
                    <a href="support.html" class="text-zinc-500 hover:text-white font-bold uppercase text-xs tracking-widest py-2">Support</a>
                    <a href="#" class="text-zinc-500 hover:text-white font-bold uppercase text-xs tracking-widest py-2 mt-8">Sign Out</a>
                </nav>
            </aside>

            <!-- Content -->
            <div class="flex-1">
                <h3 class="text-xs font-mono uppercase tracking-[0.4em] text-zinc-500 mb-8">Order History</h3>
                
                <div class="space-y-4">
                    <!-- Order Item -->
                    <div class="order-row py-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <p class="font-bold text-sm">#OD-88291-X</p>
                            <p class="text-zinc-500 text-xs font-mono">OCTOBER 12, 2025</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="px-3 py-1 bg-zinc-900 rounded-full text-[10px] font-bold uppercase">Delivered</span>
                            <p class="font-mono text-sm">$240.00</p>
                            <button class="text-white hover:underline text-xs font-bold uppercase">View</button>
                        </div>
                    </div>

                    <div class="order-row py-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <p class="font-bold text-sm">#OD-77210-B</p>
                            <p class="text-zinc-500 text-xs font-mono">AUGUST 05, 2025</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="px-3 py-1 bg-zinc-900 rounded-full text-[10px] font-bold uppercase">Delivered</span>
                            <p class="font-mono text-sm">$120.00</p>
                            <button class="text-white hover:underline text-xs font-bold uppercase">View</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
