<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHECKOUT | ODESHI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .input-box { background: transparent; border: 1px solid #27272a; border-radius: 0.75rem; padding: 1rem; width: 100%; outline: none; transition: border-color 0.3s; }
        .input-box:focus { border-color: #fff; }
    </style>
</head>
<body class="selection:bg-red-600">

    <div class="p-6 border-b border-zinc-900 flex justify-between items-center">
        <a href="index.html"><img src=".src/odeshi-2.png" class="h-4 w-auto mix-blend-difference" alt="Logo"></a>
        <a href="cart.html" class="text-zinc-500 hover:text-white transition-colors"><i data-lucide="shopping-bag" class="w-5 h-5"></i></a>
    </div>

    <main class="max-w-6xl mx-auto px-6 py-20 grid grid-cols-1 lg:grid-cols-2 gap-20">
        <!-- Forms -->
        <div class="space-y-12">
            <section>
                <h3 class="text-xs font-mono uppercase tracking-[0.4em] text-zinc-500 mb-6">Contact Information</h3>
                <input type="email" placeholder="Email Address" class="input-box mb-4">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="news" class="accent-white">
                    <label for="news" class="text-xs text-zinc-500 uppercase tracking-tighter">Email me with news and limited drops</label>
                </div>
            </section>

            <section>
                <h3 class="text-xs font-mono uppercase tracking-[0.4em] text-zinc-500 mb-6">Shipping Address</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="text" placeholder="First Name" class="input-box">
                    <input type="text" placeholder="Last Name" class="input-box">
                </div>
                <input type="text" placeholder="Address" class="input-box mb-4">
                <div class="grid grid-cols-3 gap-4 mb-4">
                    <input type="text" placeholder="City" class="input-box">
                    <input type="text" placeholder="Postal Code" class="input-box">
                    <input type="text" placeholder="Country" class="input-box">
                </div>
            </section>

            <section>
                <h3 class="text-xs font-mono uppercase tracking-[0.4em] text-zinc-500 mb-6">Payment</h3>
                <div class="border border-zinc-900 rounded-2xl overflow-hidden">
                    <div class="p-6 bg-zinc-950 flex justify-between items-center border-b border-zinc-900">
                        <span class="text-xs font-bold uppercase tracking-widest">Credit Card</span>
                        <div class="flex gap-2">
                            <div class="w-8 h-5 bg-zinc-800 rounded"></div>
                            <div class="w-8 h-5 bg-zinc-800 rounded"></div>
                        </div>
                    </div>
                    <div class="p-6 space-y-4">
                        <input type="text" placeholder="Card Number" class="input-box">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" placeholder="Expiry (MM/YY)" class="input-box">
                            <input type="text" placeholder="CVC" class="input-box">
                        </div>
                    </div>
                </div>
            </section>

            <button class="w-full bg-white text-black py-6 rounded-full font-black uppercase text-sm tracking-[0.2em] hover:bg-red-600 hover:text-white transition-all shadow-[0_20px_50px_rgba(255,255,255,0.1)]">Complete Purchase</button>
        </div>

        <!-- Sticky Summary -->
        <div class="hidden lg:block">
            <div class="sticky top-10 bg-zinc-950 p-10 rounded-[2.5rem] border border-zinc-900">
                <div class="flex gap-4 mb-8">
                    <div class="w-20 h-24 bg-zinc-900 rounded-xl overflow-hidden relative">
                        <img src=".src/odeshi-bfbloodline-black-hoodie.jpeg" class="w-full h-full object-cover">
                        <span class="absolute -top-2 -right-2 bg-white text-black w-5 h-5 flex items-center justify-center rounded-full text-[10px] font-bold">1</span>
                    </div>
                    <div class="flex-1 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-sm uppercase">Bloodline Hoodie</p>
                            <p class="text-[10px] text-zinc-500 uppercase font-mono">Large / Black</p>
                        </div>
                        <p class="font-mono text-sm">$120.00</p>
                    </div>
                </div>

                <div class="space-y-3 py-6 border-y border-zinc-900 mb-6">
                    <div class="flex justify-between text-xs text-zinc-500 uppercase tracking-widest">
                        <span>Subtotal</span>
                        <span class="text-white font-mono">$120.00</span>
                    </div>
                    <div class="flex justify-between text-xs text-zinc-500 uppercase tracking-widest">
                        <span>Shipping</span>
                        <span class="text-white font-mono">$15.00</span>
                    </div>
                </div>

                <div class="flex justify-between items-end">
                    <span class="text-xs uppercase font-mono text-zinc-500">Total USD</span>
                    <span class="text-4xl font-black font-mono">$135.00</span>
                </div>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
