<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISHLIST | ODESHI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .header-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0.95), rgba(0,0,0,0)); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="selection:bg-red-600">

    <div class="fixed top-0 left-0 w-full z-50 p-6 flex justify-between items-center header-gradient">
        <a href="index.html"><img src=".src/odeshi-2.png" class="h-6 w-auto mix-blend-difference" alt="Logo"></a>
        <div class="flex items-center gap-7">
            <a href="profile.html"><i data-lucide="circle-user" class="w-6 h-6"></i></a>
            <a href="cart.html"><i data-lucide="shopping-cart" class="w-6 h-6"></i></a>
        </div>
    </div>

    <main class="pt-40 pb-24 px-6 md:px-20 max-w-6xl mx-auto">
        <h1 class="text-6xl font-black uppercase tracking-tighter mb-16">Saved Objects</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Wishlist Item -->
            <div class="group">
                <div class="aspect-[3/4] bg-zinc-900 rounded-3xl overflow-hidden relative border border-zinc-900">
                    <img src=".src/odeshi-primal-black.jpeg" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                    <button class="absolute top-4 right-4 bg-black/50 backdrop-blur-md p-2 rounded-full border border-white/10 text-white hover:text-red-600 transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                    <div class="absolute inset-x-4 bottom-4 translate-y-12 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
                        <button class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase text-xs tracking-tighter">Move to Bag</button>
                    </div>
                </div>
                <div class="mt-6 flex justify-between items-start">
                    <div>
                        <h4 class="font-bold text-lg uppercase tracking-tight">Primal Utility Vest</h4>
                        <p class="text-zinc-500 text-xs uppercase">Black / Technical Nylon</p>
                    </div>
                    <span class="font-mono text-zinc-300 font-bold">$165</span>
                </div>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
